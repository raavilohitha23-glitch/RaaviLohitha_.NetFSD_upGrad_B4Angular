<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - Upgrad EMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="events-page">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Upgrad Events</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link active" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Events Page Content -->
  <div class="container mt-4">
    <h1 class="text-center">Manage Events</h1>

    <!-- Logout Button -->
    <div class="text-end mb-3">
      <button id="logoutBtn" class="btn btn-danger">Logout</button>
    </div>

    <!-- Add Event Form -->
    <form id="addEventForm" class="p-3 border rounded bg-light mb-4">
      <h4>Add New Event</h4>
      <div class="row mb-3">
        <div class="col-md-4">
          <label for="eventId" class="form-label">Event ID</label>
          <input type="text" id="eventId" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label for="eventName" class="form-label">Event Name</label>
          <input type="text" id="eventName" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label for="eventCategory" class="form-label">Category</label>
          <select id="eventCategory" class="form-select" required>
            <option value="">Select Category</option>
            <option value="Tech & Innovations">Tech & Innovations</option>
            <option value="Industrial Event">Industrial Event</option>
          </select>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-4">
          <label for="eventDate" class="form-label">Date</label>
          <input type="date" id="eventDate" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label for="eventTime" class="form-label">Time</label>
          <input type="time" id="eventTime" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label for="eventUrl" class="form-label">Event URL</label>
          <input type="url" id="eventUrl" class="form-control" required>
        </div>
      </div>
      <button type="submit" class="btn btn-success">Add Event</button>
    </form>


    <div class="mb-3">
      <input type="text" id="searchInput" class="form-control" placeholder="Search by ID, Name, or Category">
    </div>


    <div id="eventsList" class="row">
    </div>
  </div>

  


  <script src="js/db.js"></script>
  <script src="js/events.js"></script>

</body>
</html>
